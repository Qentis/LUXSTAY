<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXSTAY | Premium Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="relative min-h-screen flex flex-col">

    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[500px] h-[500px] rounded-full bg-blue-100/50 mix-blend-multiply filter blur-[100px] opacity-70"></div>
        <div class="absolute top-[20%] -right-[10%] w-[400px] h-[400px] rounded-full bg-rose-100/40 mix-blend-multiply filter blur-[100px] opacity-70"></div>
    </div>

    <header class="sticky top-0 z-50 glass-card border-b-0 mx-4 mt-4 rounded-2xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="brand-logo text-2xl font-extrabold tracking-tighter text-gray-900">LUXSTAY</a>
            
            <nav class="flex items-center gap-2 md:gap-4">
                {% if google.authorized %}
                    <a href="/dashboard" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-gray-600 hover:text-gray-900 hover:bg-gray-100/50 transition-all">
                        Дашборд
                    </a>
                    <a href="/add_property" class="btn-primary px-6 py-2.5 rounded-xl font-semibold text-sm">
                        + Добавить объект
                    </a>
                    <a href="/logout" class="px-5 py-2.5 rounded-xl text-sm font-semibold text-red-500 hover:text-red-700 hover:bg-red-50 transition-all">
                        Выйти
                    </a>
                {% else %}
                    <a href="{{ url_for('google.login') }}" class="glass-card px-6 py-2.5 rounded-xl font-semibold text-sm hover:border-gray-900 hover:bg-gray-900 hover:text-white transition-all">
                        Войти через Google
                    </a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto py-12 px-4 sm:px-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
